services:
  postgres:
    image: postgres:alpine
    container_name: fms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fms}
      POSTGRES_USER: ${POSTGRES_USER:-fms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fms_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio
    container_name: fms-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    container_name: fms-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
    environment:
      FLASK_APP: run.py
      FLASK_ENV: development
      FLASK_DEBUG: 1

      POSTGRES_DB: ${POSTGRES_DB:-fms}
      POSTGRES_USER: ${POSTGRES_USER:-fms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fms_password}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-fms-bucket}
      S3_REGION: ${S3_REGION:-ap-northeast-2}
      S3_USE_SSL: "false"
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: flask run --host=0.0.0.0 --port=5000

  frontend:
    build:
      context: ./frontend
    container_name: fms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  minio_data: